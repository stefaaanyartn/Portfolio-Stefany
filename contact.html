<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stefany Artana — Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page-wrap">
    <div class="contact-wrap">
      <div class="card contact-card">
        <h2>Contact Me</h2>
        <form id="contact-form" action="https://formspree.io/f/mojgqenq" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me more about your project..." required></textarea>
          </div>
          <button type="submit" class="submit-btn" id="submit-btn">Submit</button>
          <p class="form-status" id="form-status"></p>
        </form>
      </div>

      <p class="footer-copy">© 2026 Stefany Artana | All Rights Reserved.</p>
    </div>
  </main>

  <nav class="floating-dock">
    <a href="index.html" title="Home"><i data-lucide="home"></i></a>
    <a href="projects.html" title="Projects"><i data-lucide="code"></i></a>
    <div class="dock-sep"></div>
      <a href="https://linkedin.com/in/stefanyartana" target="_blank" rel="noopener noreferrer" title="LinkedIn">
        <img src="assets/icons/linkwhite.png" alt="LinkedIn" width="18" height="18" id="icon-linkedin-dockkk">
      </a>
      <a href="https://github.com/stefaaanyartn" target="_blank" rel="noopener noreferrer" title="Github">
        <img src="assets/icons/gitwhite.png" alt="Github" width="18" height="18" id="icon-github-dockkk">
      </a>
      <a href="assets/docs/CV_STEFANY_ARTANA.pdf" title="Resume"><i data-lucide="file-user"></i></a>
    <div class="dock-sep"></div>
    <button type="button" id="theme-toggle" title="Toggle Theme">🌙</button>
  </nav>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
  <script src="script.js"></script>
</body>
</html>
